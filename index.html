<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Gallery</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: system-ui, sans-serif; }
  #map { width: 100%; height: 100%; }

  /* Camera icon markers */
  .camera-icon {
    cursor: pointer;
    font-size: 24px;
    line-height: 1;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
    transition: transform 0.15s;
    position: relative;
  }
  .camera-icon:hover {
    transform: scale(1.3);
  }

  /* Thumbnail popup on hover */
  .photo-preview {
    display: none;
    position: absolute;
    bottom: 38px;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 150px;
    border: 3px solid #fff;
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    object-fit: cover;
    pointer-events: none;
    z-index: 2000;
  }
  .camera-icon:hover .photo-preview {
    display: block;
  }

  /* Lightbox overlay */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 10000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #lightbox.active { display: flex; }

  #lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 4px;
  }

  #lightbox .close-btn {
    position: absolute;
    top: 16px;
    right: 24px;
    color: #fff;
    font-size: 36px;
    cursor: pointer;
    line-height: 1;
    opacity: 0.8;
  }
  #lightbox .close-btn:hover { opacity: 1; }

  #lightbox .nav-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 16px;
  }
  #lightbox .nav-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 24px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  #lightbox .nav-btn:hover { background: rgba(255,255,255,0.3); }
  #lightbox .counter {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
  }
  #lightbox .photo-caption {
    color: rgba(255,255,255,0.85);
    font-size: 15px;
    margin-top: 12px;
    max-width: 90vw;
    text-align: center;
  }
  #lightbox .photo-date {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    margin-top: 4px;
  }

  /* Route legend */
  .route-legend {
    background: white;
    padding: 8px 12px;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    font-size: 13px;
    line-height: 1.8;
  }
  .route-legend-title {
    font-weight: 600;
    margin-bottom: 4px;
  }
  .route-legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .route-legend-color {
    width: 20px;
    height: 3px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="lightbox">
  <span class="close-btn" id="lb-close">&times;</span>
  <img id="lb-img" src="" alt="Photo">
  <div class="photo-caption" id="lb-caption"></div>
  <div class="photo-date" id="lb-date"></div>
  <div class="nav-bar">
    <button class="nav-btn" id="lb-prev">&#8592;</button>
    <span class="counter" id="lb-counter"></span>
    <button class="nav-btn" id="lb-next">&#8594;</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(async function() {
  const resp = await fetch('data.json');
  const data = await resp.json();

  const ROUTE_COLORS = ['#e63946', '#457b9d', '#2a9d8f', '#e9c46a', '#f4a261',
                         '#264653', '#a8dadc', '#d62828', '#6a994e', '#bc6c25'];

  const map = L.map('map', { zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 20,
    subdomains: 'abcd',
  }).addTo(map);

  // Draw routes (one color per route)
  let bounds = L.latLngBounds([]);
  const legendItems = [];

  data.routes.forEach((route, idx) => {
    const color = ROUTE_COLORS[idx % ROUTE_COLORS.length];
    for (const line of route.lines) {
      const polyline = L.polyline(line.coords, {
        color: color,
        weight: 3,
        opacity: 0.8,
      }).addTo(map);
      bounds.extend(polyline.getBounds());
    }
    legendItems.push({ name: route.name, color: color });
  });

  // Add photo markers
  const photos = data.photos;

  for (let i = 0; i < photos.length; i++) {
    const p = photos[i];
    bounds.extend([p.lat, p.lon]);

    const icon = L.divIcon({
      className: '',
      html: `<div class="camera-icon">&#128248;<img src="${p.thumb}" class="photo-preview" /></div>`,
      iconSize: [24, 24],
      iconAnchor: [12, 12],
    });

    const marker = L.marker([p.lat, p.lon], { icon: icon, zIndexOffset: 500 }).addTo(map);
    marker.on('click', () => openLightbox(i));
  }

  // Fit map to all content
  if (bounds.isValid()) {
    map.fitBounds(bounds.pad(0.05));
  }

  const legend = L.control({ position: 'bottomleft' });
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'route-legend');
    div.innerHTML = '<div class="route-legend-title">Routes</div>' +
      legendItems.map(item =>
        `<div class="route-legend-item">
          <span class="route-legend-color" style="background:${item.color}"></span>
          ${item.name}
        </div>`
      ).join('');
    return div;
  };
  legend.addTo(map);

  // Lightbox
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCaption = document.getElementById('lb-caption');
  const lbDate = document.getElementById('lb-date');
  const lbCounter = document.getElementById('lb-counter');
  let currentIdx = 0;

  function openLightbox(idx) {
    currentIdx = idx;
    showPhoto(false);
  }

  let savedZoom = null;
  let savedCenter = null;

  function showPhoto(animate) {
    const p = photos[currentIdx];
    // Save original view before first zoom
    if (savedZoom === null) {
      savedZoom = map.getZoom();
      savedCenter = map.getCenter();
    }
    // Hide lightbox while moving
    lightbox.classList.remove('active');

    // Compute center offset so photo location appears at bottom center
    const targetZoom = 5;
    const mapSize = map.getSize();
    const targetPoint = map.project([p.lat, p.lon], targetZoom);
    const centerPoint = L.point(targetPoint.x, targetPoint.y - mapSize.y * 0.3);
    const centerLatLng = map.unproject(centerPoint, targetZoom);

    const onDone = () => {
      updateLightbox();
      lightbox.classList.add('active');
    };

    if (animate) {
      map.once('moveend', onDone);
      map.flyTo(centerLatLng, targetZoom, { duration: 0.6 });
    } else {
      map.setView(centerLatLng, targetZoom, { animate: false });
      onDone();
    }
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    if (savedZoom !== null) {
      map.flyTo(savedCenter, savedZoom, { duration: 0.6 });
      savedZoom = null;
      savedCenter = null;
    }
  }

  function updateLightbox() {
    const p = photos[currentIdx];
    lbImg.src = p.full;
    lbCaption.textContent = p.description || '';
    lbCounter.textContent = `${currentIdx + 1} / ${photos.length}`;
    if (p.date) {
      const [datePart] = p.date.split(' ');
      const [y, m, d] = datePart.split(':');
      const dt = new Date(+y, +m - 1, +d);
      lbDate.textContent = dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    } else {
      lbDate.textContent = '';
    }
  }

  function navigate(dir) {
    currentIdx = (currentIdx + dir + photos.length) % photos.length;
    showPhoto(true);
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
  document.getElementById('lb-next').addEventListener('click', () => navigate(1));

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });
})();
</script>
</body>
</html>

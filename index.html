<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Gallery</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: system-ui, sans-serif; }
  #map { width: 100%; height: 100%; }

  /* Map icon markers */
  .camera-icon, .video-icon {
    cursor: pointer;
    width: 28px;
    height: 28px;
    background: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.7));
    transition: transform 0.15s;
    position: relative;
  }
  .camera-icon svg, .video-icon svg {
    width: 16px;
    height: 16px;
    fill: #fff;
  }
  .camera-icon:hover, .video-icon:hover {
    transform: scale(1.3);
  }

  /* Thumbnail popup on hover */
  .photo-preview {
    display: none;
    position: absolute;
    bottom: 38px;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 150px;
    border: 3px solid #fff;
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    object-fit: cover;
    pointer-events: none;
    z-index: 2000;
  }
  .camera-icon:hover .photo-preview,
  .video-icon:hover .photo-preview {
    display: block;
  }

  /* Lightbox overlay */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 10000;
    align-items: center;
    justify-content: center;
  }
  #lightbox.active { display: flex; }

  #lb-slider {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  #lb-strip {
    display: flex;
    align-items: center;
    height: 100%;
  }
  #lightbox.active #lb-strip {
    will-change: transform;
  }
  #lb-strip.animating {
    transition: transform 0.3s ease;
  }
  .lb-slide {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .lb-slide img, .lb-slide video {
    max-width: 98vw;
    max-height: 96vh;
    border: 10px solid black;
    border-radius: 4px;
    cursor: pointer;
  }

  #lightbox .close-btn,
  #lightbox .nav-btn,
  #lightbox .nav-bar {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #lightbox.show-controls .close-btn,
  #lightbox.show-controls .nav-btn,
  #lightbox.show-controls .nav-bar {
    opacity: 1;
    pointer-events: auto;
  }
  #lightbox.show-controls .close-btn:hover { opacity: 1; }

  #lightbox .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    color: #fff;
    font-size: 36px;
    cursor: pointer;
    line-height: 1;
    background: rgba(0,0,0,0.5);
    width: 44px;
    height: 44px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10002;
  }

  #lightbox .nav-bar {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 20px;
    background: rgba(0,0,0,0.6);
    border-radius: 8px;
    backdrop-filter: blur(8px);
    z-index: 10001;
  }
  #lightbox .nav-btn {
    background: rgba(0,0,0,0.5);
    border: none;
    color: rgba(255,255,255,0.85);
    font-size: 48px;
    font-weight: 200;
    width: 56px;
    height: 80px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10001;
  }
  #lightbox .nav-btn:hover { color: #fff; background: rgba(0,0,0,0.7); }
  #lb-prev { left: 0; border-radius: 0 6px 6px 0; }
  #lb-next { right: 0; border-radius: 6px 0 0 6px; }
  #lightbox .counter {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
  }
  #lightbox .photo-caption {
    color: rgba(255,255,255,0.85);
    font-size: 15px;
  }
  #lightbox .photo-date {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    margin-top: 2px;
  }

  /* Route legend */
  .route-legend {
    background: white;
    padding: 8px 12px;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    font-size: 13px;
    line-height: 1.8;
  }
  .route-legend-title {
    font-weight: 600;
    margin-bottom: 4px;
  }
  .route-legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .route-legend-color {
    width: 20px;
    height: 3px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="lightbox">
  <span class="close-btn" id="lb-close">&times;</span>
  <div id="lb-slider">
    <div id="lb-strip">
      <div class="lb-slide"></div>
      <div class="lb-slide"></div>
      <div class="lb-slide"></div>
    </div>
  </div>
  <button class="nav-btn" id="lb-prev">&#8249;</button>
  <button class="nav-btn" id="lb-next">&#8250;</button>
  <div class="nav-bar">
    <div class="photo-caption" id="lb-caption"></div>
    <div class="photo-date" id="lb-date"></div>
    <span class="counter" id="lb-counter"></span>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(async function() {
  const resp = await fetch('data.json');
  const data = await resp.json();

  const ROUTE_COLORS = ['#e63946', '#457b9d', '#2a9d8f', '#e9c46a', '#f4a261',
                         '#264653', '#a8dadc', '#d62828', '#6a994e', '#bc6c25'];

  const map = L.map('map', { zoomControl: true });
  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>)',
    maxZoom: 17,
    subdomains: 'abc',
  }).addTo(map);

  // Draw routes (one color per route)
  let bounds = L.latLngBounds([]);
  const legendItems = [];

  data.routes.forEach((route, idx) => {
    const color = ROUTE_COLORS[idx % ROUTE_COLORS.length];
    for (const line of route.lines) {
      L.polyline(line.coords, {
        color: '#fff',
        weight: 9,
        opacity: 0.8,
      }).addTo(map);
      const polyline = L.polyline(line.coords, {
        color: color,
        weight: 5,
        opacity: 1,
      }).addTo(map);
      bounds.extend(polyline.getBounds());
    }
    legendItems.push({ name: route.name, color: color });
  });

  // Merge photos and videos into a single media array, sorted by date
  const mediaItems = [...data.photos, ...(data.videos || [])].sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  // Add markers for all media
  const CAMERA_SVG = '<svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4z"/><path d="M9 2 7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>';
  const VIDEO_SVG = '<svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>';

  for (let i = 0; i < mediaItems.length; i++) {
    const p = mediaItems[i];
    bounds.extend([p.lat, p.lon]);

    const isVideo = p.type === 'video';
    const iconClass = isVideo ? 'video-icon' : 'camera-icon';
    const svgIcon = isVideo ? VIDEO_SVG : CAMERA_SVG;
    const icon = L.divIcon({
      className: '',
      html: `<div class="${iconClass}">${svgIcon}<img src="${p.thumb}" class="photo-preview" /></div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 14],
    });

    const marker = L.marker([p.lat, p.lon], { icon: icon, zIndexOffset: 500 }).addTo(map);
    marker.on('click', () => openLightbox(i));
  }

  // Fit map to all content
  if (bounds.isValid()) {
    map.fitBounds(bounds.pad(0.05));
  }

  const legend = L.control({ position: 'bottomleft' });
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'route-legend');
    div.innerHTML = '<div class="route-legend-title">Routes</div>' +
      legendItems.map(item =>
        `<div class="route-legend-item">
          <span class="route-legend-color" style="background:${item.color}"></span>
          ${item.name}
        </div>`
      ).join('');
    return div;
  };
  legend.addTo(map);

  // Lightbox
  const lightbox = document.getElementById('lightbox');
  const lbStrip = document.getElementById('lb-strip');
  const lbSlides = lbStrip.querySelectorAll('.lb-slide');
  const lbCaption = document.getElementById('lb-caption');
  const lbDate = document.getElementById('lb-date');
  const lbCounter = document.getElementById('lb-counter');
  const lbSlider = document.getElementById('lb-slider');
  const slideWidth = () => lbSlider.offsetWidth || window.innerWidth;
  let currentIdx = 0;
  let sliding = false;

  function wrapIdx(i) {
    return (i + mediaItems.length) % mediaItems.length;
  }

  function setSlideContent(slideEl, item) {
    slideEl.innerHTML = '';
    if (item.type === 'video') {
      const video = document.createElement('video');
      video.src = item.video;
      video.controls = true;
      video.playsInline = true;
      video.preload = 'metadata';
      slideEl.appendChild(video);
    } else {
      const img = document.createElement('img');
      img.src = item.full;
      img.alt = 'Photo';
      slideEl.appendChild(img);
    }
  }

  function pauseAllVideos() {
    lbStrip.querySelectorAll('video').forEach(v => { v.pause(); });
  }

  function loadStrip() {
    const prev = mediaItems[wrapIdx(currentIdx - 1)];
    const curr = mediaItems[currentIdx];
    const next = mediaItems[wrapIdx(currentIdx + 1)];
    setSlideContent(lbSlides[0], prev);
    setSlideContent(lbSlides[1], curr);
    setSlideContent(lbSlides[2], next);
    lbStrip.classList.remove('animating');
    lbStrip.style.transform = `translateX(-${slideWidth()}px)`;
    const currentVideo = lbSlides[1].querySelector('video');
    if (currentVideo) currentVideo.play();
  }

  function updateMeta() {
    const p = mediaItems[currentIdx];
    lbCaption.textContent = p.description || '';
    lbCounter.textContent = `${currentIdx + 1} / ${mediaItems.length}`;
    if (p.date) {
      const [datePart] = p.date.split(' ');
      const [y, m, d] = datePart.split(':');
      const dt = new Date(+y, +m - 1, +d);
      lbDate.textContent = dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    } else {
      lbDate.textContent = '';
    }
  }

  function openLightbox(idx) {
    currentIdx = idx;
    showPhoto();
  }

  function moveMapToPhoto(animate) {
    const p = mediaItems[currentIdx];
    const targetZoom = 7;
    const mapSize = map.getSize();
    const targetPoint = map.project([p.lat, p.lon], targetZoom);
    const centerPoint = L.point(targetPoint.x, targetPoint.y - mapSize.y * 0.3);
    const centerLatLng = map.unproject(centerPoint, targetZoom);

    if (animate) {
      map.flyTo(centerLatLng, targetZoom, { duration: 0.6 });
    } else {
      map.setView(centerLatLng, targetZoom, { animate: false });
    }
  }

  function showPhoto() {
    lightbox.classList.remove('show-controls');
    lightbox.classList.add('active');
    loadStrip();
    updateMeta();
    moveMapToPhoto(false);
  }

  function closeLightbox() {
    pauseAllVideos();
    lightbox.classList.remove('active');
    lightbox.style.background = '';
    touchStartX = null;
    touchStartY = null;
    touchDragging = false;
    touchDraggingV = false;
  }

  function completeSlide(dir) {
    pauseAllVideos();
    currentIdx = wrapIdx(currentIdx + dir);
    loadStrip();
    updateMeta();
    moveMapToPhoto(true);
    lightbox.classList.remove('show-controls');
    sliding = false;
  }

  function animateSlide(dir) {
    if (sliding) return;
    sliding = true;
    const w = slideWidth();
    const target = dir === -1 ? 0 : -2 * w;
    lbStrip.classList.add('animating');
    lbStrip.style.transform = `translateX(${target}px)`;
    lbStrip.addEventListener('transitionend', () => completeSlide(dir), { once: true });
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => animateSlide(-1));
  document.getElementById('lb-next').addEventListener('click', () => animateSlide(1));

  lbSlider.addEventListener('click', (e) => {
    if (sliding) return;
    lightbox.classList.toggle('show-controls');
  });

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') animateSlide(-1);
    if (e.key === 'ArrowRight') animateSlide(1);
  });

  // Touch swipe with live drag tracking
  let touchStartX = null;
  let touchStartY = null;
  let touchDragging = false;   // horizontal
  let touchDraggingV = false;  // vertical

  lightbox.addEventListener('touchstart', (e) => {
    if (sliding) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchDragging = false;
    touchDraggingV = false;
    lbStrip.classList.remove('animating');
  }, { passive: true });

  lightbox.addEventListener('touchmove', (e) => {
    if (touchStartX === null || sliding) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    // Lock direction after first significant move
    if (!touchDragging && !touchDraggingV && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
      if (Math.abs(dy) > Math.abs(dx)) {
        touchDraggingV = true;
      } else {
        touchDragging = true;
      }
    }
    if (touchDragging) {
      e.preventDefault();
      const w = slideWidth();
      lbStrip.style.transform = `translateX(${-w + dx}px)`;
    }
    if (touchDraggingV) {
      e.preventDefault();
      const opacity = Math.max(0, 1 - Math.abs(dy) / 300);
      lightbox.style.background = `rgba(0,0,0,${0.5 * opacity})`;
      lbStrip.style.transform = `translateX(-${slideWidth()}px) translateY(${dy}px)`;
    }
  }, { passive: false });

  lightbox.addEventListener('touchend', (e) => {
    if (touchStartX === null || sliding) { touchStartX = null; return; }
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    touchStartX = null;
    touchStartY = null;

    if (touchDraggingV) {
      if (Math.abs(dy) > 80) {
        closeLightbox();
      }
      lightbox.style.background = '';
      lbStrip.style.transform = `translateX(-${slideWidth()}px)`;
      touchDraggingV = false;
    } else if (touchDragging && Math.abs(dx) > 50) {
      animateSlide(dx < 0 ? 1 : -1);
    } else {
      lbStrip.classList.add('animating');
      lbStrip.style.transform = `translateX(-${slideWidth()}px)`;
    }
    touchDragging = false;
  }, { passive: true });

  lightbox.addEventListener('touchcancel', () => {
    touchStartX = null;
    touchStartY = null;
    touchDragging = false;
    touchDraggingV = false;
    lightbox.style.background = '';
    lbStrip.style.transform = `translateX(-${slideWidth()}px)`;
  }, { passive: true });
})();
</script>
</body>
</html>
